<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ report.title }} - AI全知</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e1e4e8; line-height: 1.7; max-width: 860px; margin: 0 auto; padding: 2rem; }
    a { color: #58a6ff; }
    .back { margin-bottom: 2rem; }
    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
    .meta { color: #8b949e; font-size: 0.9rem; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #30363d; }
    .content h2 { color: #58a6ff; margin: 1.5rem 0 0.75rem; font-size: 1.2rem; }
    .content h3 { color: #bc8cff; margin: 1rem 0 0.5rem; }
    .content p, .content li { margin-bottom: 0.5rem; }
    .content ul { padding-left: 1.5rem; }
    .content code { background: #21262d; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.9em; }
    .content pre { background: #161b22; padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 1rem 0; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.75rem; background: #21262d; color: #d29922; }
  </style>
</head>
<body>
  <div class="back"><a href="/">← 返回首页</a></div>
  <h1>{{ report.title }}</h1>
  <div class="meta">
    <span class="badge">{{ report.quality_label }}</span>
    {{ report.report_type.value }} · {{ report.created_at.strftime('%Y-%m-%d %H:%M') }}
    {% if report.article %}
    · <a href="{{ report.article.url }}" target="_blank">原始来源</a>
    {% endif %}
  </div>
  <div class="content">{{ html_content | safe }}</div>
</body>
</html>
