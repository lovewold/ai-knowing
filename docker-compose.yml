services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiknow
      POSTGRES_PASSWORD: aiknow
      POSTGRES_DB: aiknow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiknow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./config:/config
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://aiknow:aiknow@postgres:5432/aiknow
      REDIS_URL: redis://redis:6379/0
      CONFIG_DIR: /config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./config:/config
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://aiknow:aiknow@postgres:5432/aiknow
      REDIS_URL: redis://redis:6379/0
      CONFIG_DIR: /config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
      - ./config:/config
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://aiknow:aiknow@postgres:5432/aiknow
      REDIS_URL: redis://redis:6379/0
      CONFIG_DIR: /config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
